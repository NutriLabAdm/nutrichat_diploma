<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      .box { fill: #f5f5f5; stroke: #333; stroke-width: 1.5; rx: 4; }
      .header { fill: #e3f2fd; stroke: #333; stroke-width: 1.5; }
      .title { font-family: Arial, sans-serif; font-size: 14px; }
      .text { font-family: monospace; font-size: 12px; fill: #333; }
      .icon { font-family: Arial, sans-serif; font-size: 14px; }
      .divider { stroke: #333; stroke-width: 1; }
    </style>
  </defs>

  <!-- Main border -->
  <rect x="10" y="10" width="780" height="380" class="box"/>

  <!-- Header row -->
  <rect x="10" y="10" width="780" height="40" class="header"/>
  <line x1="10" y1="50" x2="790" y2="50" class="divider"/>

  <!-- Header tabs -->
  <text x="30" y="37" class="icon">⚙</text>
  <text x="50" y="37" class="title">Настройки</text>

  <rect x="140" y="18" width="100" height="24" fill="#fff" stroke="#333" stroke-width="1" rx="2"/>
  <text x="145" y="35" class="text">📋 Эксперимент</text>

  <rect x="260" y="18" width="120" height="24" fill="#fff" stroke="#333" stroke-width="1" rx="2"/>
  <text x="265" y="35" class="text">ℹ️ О проекте</text>

  <!-- Main content area - split -->
  <line x1="200" y1="50" x2="200" y2="390" class="divider"/>

  <!-- Left panel - labels -->
  <text x="30" y="80" class="title" font-weight="bold">Параметры</text>
  <text x="30" y="110" class="title" font-weight="bold">Результаты</text>

  <!-- Right panel - items with tree structure -->
  <text x="220" y="80" class="text">├── Управление функциями (15 функций)</text>
  <text x="220" y="105" class="text">├── Тарифы</text>
  <text x="220" y="130" class="text">├── Интервенции</text>
  <text x="220" y="155" class="text">├── Красные флаги</text>
  <text x="220" y="180" class="text">└── Матрица функций-интервенций</text>

</svg>